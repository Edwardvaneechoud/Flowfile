<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9A6FF8"/><stop offset="1" stop-color="#7A45E6"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- two overlapping sets; overlap reads darker via stacked translucency -->
  <g stroke="#FFFFFF" stroke-width="4.5" fill="#FFFFFF">
    <circle cx="40" cy="50" r="17" fill-opacity="0.22"/>
    <circle cx="60" cy="50" r="17" fill-opacity="0.22"/>
  </g>
</svg>
