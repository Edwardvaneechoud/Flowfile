name: Flowfile WASM Build

on:
  push:
    branches: [main]
    paths:
      - 'flowfile_wasm/**'
      - '.github/workflows/flowfile-wasm-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flowfile_wasm/**'
      - '.github/workflows/flowfile-wasm-build.yml'
  workflow_dispatch:

# Explicit permissions for security
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: flowfile_wasm/package-lock.json

      - name: Install dependencies
        working-directory: flowfile_wasm
        run: npm ci

      - name: Build
        working-directory: flowfile_wasm
        run: npm run build

      - name: Build library (flowfile-editor npm surface)
        working-directory: flowfile_wasm
        run: npm run build:lib

      - name: Guard the published bundle against literal CDN imports
        working-directory: flowfile_wasm
        run: |
          if grep -q 'import("https://' dist/flowfile-editor.js; then
            echo 'dist/flowfile-editor.js contains a literal https: import() — breaks webpack5/esbuild embedders'
            exit 1
          fi

      - name: Run tests
        working-directory: flowfile_wasm
        run: npm run test:run

  python-engine-tests:
    # Runs the in-browser Pyodide engine (src/pyodide/engine/) under CPython
    # with the exact Polars/Pydantic versions Pyodide v0.27.7 bundles, so engine
    # logic regressions are caught before they reach a user's browser.
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pinned engine test deps
        run: pip install -r flowfile_wasm/tests/python/requirements.txt

      - name: Run Python engine tests
        run: python -m pytest flowfile_wasm/tests/python -v

  pyodide-smoke:
    # Boots real Pyodide and replays the flow-store bridge against the engine
    # package (FS write + namespace dump). Catches browser-only namespace/bootstrap
    # breakage the CPython unit tests cannot (e.g. the bridge referencing engine
    # internals/modules). pyodide is installed on-demand — it is intentionally NOT a
    # package dependency (the app CDN-loads it).
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Pyodide + parquet-wasm (on-demand, not saved to package.json)
        working-directory: flowfile_wasm
        run: npm install --no-save pyodide@0.27.7 parquet-wasm@0.7.1

      - name: Run Pyodide bridge smoke test
        working-directory: flowfile_wasm
        run: node tests/pyodide-smoke/smoke.cjs
