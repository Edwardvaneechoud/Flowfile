name: Flowfile WASM Build

on:
  push:
    branches: [main]
    paths:
      - 'flowfile_wasm/**'
      - '.github/workflows/flowfile-wasm-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flowfile_wasm/**'
      - '.github/workflows/flowfile-wasm-build.yml'
  workflow_dispatch:

# Explicit permissions for security
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: flowfile_wasm/package-lock.json

      - name: Install dependencies
        working-directory: flowfile_wasm
        run: npm ci

      - name: Build
        working-directory: flowfile_wasm
        run: npm run build

      - name: Run tests
        working-directory: flowfile_wasm
        run: npm run test:run

  python-engine-tests:
    # Runs the in-browser Pyodide engine (src/pyodide/engine.py) under CPython
    # with the exact Polars/Pydantic versions Pyodide v0.27.7 bundles, so engine
    # logic regressions are caught before they reach a user's browser.
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pinned engine test deps
        run: pip install -r flowfile_wasm/tests/python/requirements.txt

      - name: Run Python engine tests
        run: python -m pytest flowfile_wasm/tests/python -v
