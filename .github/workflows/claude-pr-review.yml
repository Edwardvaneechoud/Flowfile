name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    # Skip drafts; they still emit synchronize events
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Review PR
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for the Flowfile monorepo. First read the
            repo's CLAUDE.md (and the package-level CLAUDE.md for any touched
            package) and hold the diff to those conventions. Focus on:

            1. Correctness — logic errors, edge cases, error handling, and any
               broken cross-package contracts (core never calls .collect(); the
               worker holds dataset memory; secrets stay owner-keyed).
            2. Conventions — Polars not pandas; Pydantic v2; FastAPI patterns;
               Vue 3 Composition API + Pinia on the frontend; lean comments.
            3. Security — input validation, auth/sharing checks, secret handling.
            4. Tests & migrations — adequate coverage; an Alembic migration when
               database/models.py changes; stubs regenerated for public-API edits.

            Leave inline comments for specific issues and a top-level summary for
            general observations. Be concise and skip nits that a linter catches.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
