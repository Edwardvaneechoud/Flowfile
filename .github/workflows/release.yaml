name: Build and Release Desktop (Tauri)

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
          - platform: macos-15-intel
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: flowfile_frontend/src-tauri

      - name: Install Linux WebKit dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Poetry
        run: pip install poetry

      - name: Install Python deps
        run: poetry install --with build --no-interaction --no-ansi

      - name: Build Python services (PyInstaller)
        run: poetry run build_backends

      - name: Stage sidecars for Tauri
        run: poetry run python tools/rename_sidecar.py --triple ${{ matrix.target }}

      - name: Install frontend deps
        working-directory: flowfile_frontend
        run: npm ci

      - name: Import Apple certs (macOS)
        if: ${{ startsWith(matrix.platform, 'macos') && env.APPLE_CERTIFICATE != '' }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Prefer system xattr over the PyPI/Homebrew one (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: echo "/usr/bin" >> "$GITHUB_PATH"

      - name: Build Tauri app
        working-directory: flowfile_frontend
        env:
          # Updater signing (all platforms)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # The repo's master_key for embedded Fernet auth
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx tauri build --target ${{ matrix.target }} ${{ matrix.tauri_args }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: |
            flowfile_frontend/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/Flowfile_*.dmg
            flowfile_frontend/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/Flowfile_*-setup.exe
            flowfile_frontend/src-tauri/target/${{ matrix.target }}/release/bundle/deb/Flowfile_*.deb
          if-no-files-found: error

      - name: Upload signature artifact
        uses: actions/upload-artifact@v4
        with:
          name: signature-${{ matrix.target }}
          path: flowfile_frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Inspect artifacts
        run: |
          ls -R artifacts || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          files: |
            artifacts/bundle-*/**/Flowfile_*
            artifacts/signature-*/**/*.sig
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      # Operators must run `tools/make_latest_json.py` (or equivalent) to
      # assemble `latest.json` from the .sig files and attach it to the
      # release. We do not automate that here yet — Tauri's updater only
      # activates once both files are present and signed.
      - name: Reminder — manual latest.json upload required
        run: |
          echo "::notice::Attach latest.json to the release after this workflow"
          echo "completes. See flowfile_frontend/src-tauri/SIGNING.md for the schema."
