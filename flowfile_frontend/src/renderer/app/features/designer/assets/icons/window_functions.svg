<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    svg {
      --ff-icon-bg: #EEF2FF;
      --ff-icon-primary: #4338CA;
      --ff-icon-secondary: #818CF8;
    }
    @media (prefers-color-scheme: dark) {
      svg {
        --ff-icon-bg: #1E1B4B;
        --ff-icon-primary: #C7D2FE;
        --ff-icon-secondary: #A5B4FC;
      }
    }
  </style>
  <circle cx="50" cy="50" r="46" fill="var(--ff-icon-bg)"/>

  <!-- Sliding window frame -->
  <rect x="35" y="28" width="36" height="50" rx="8" fill="var(--ff-icon-primary)" fill-opacity="0.12" stroke="var(--ff-icon-primary)" stroke-width="2.5"/>

  <!-- Data series; bars inside the window highlighted -->
  <rect x="18.5" y="56" width="6" height="18" rx="2" fill="var(--ff-icon-secondary)"/>
  <rect x="29" y="48" width="6" height="26" rx="2" fill="var(--ff-icon-secondary)"/>
  <rect x="39.5" y="52" width="6" height="22" rx="2" fill="var(--ff-icon-primary)"/>
  <rect x="50" y="40" width="6" height="34" rx="2" fill="var(--ff-icon-primary)"/>
  <rect x="60.5" y="46" width="6" height="28" rx="2" fill="var(--ff-icon-primary)"/>
  <rect x="71" y="36" width="6" height="38" rx="2" fill="var(--ff-icon-secondary)"/>
  <rect x="81.5" y="50" width="6" height="24" rx="2" fill="var(--ff-icon-secondary)"/>
</svg>
