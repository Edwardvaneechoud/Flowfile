<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    svg {
      --ff-icon-bg: #F5F3FF;
      --ff-icon-primary: #6D28D9;
      --ff-icon-secondary: #A78BFA;
    }
    @media (prefers-color-scheme: dark) {
      svg {
        --ff-icon-bg: #2E1065;
        --ff-icon-primary: #DDD6FE;
        --ff-icon-secondary: #C4B5FD;
