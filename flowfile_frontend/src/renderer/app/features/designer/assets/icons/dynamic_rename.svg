<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    svg {
      --ff-icon-bg: #EEF2FF;
      --ff-icon-primary: #4338CA;
      --ff-icon-secondary: #818CF8;
      --ff-icon-accent: #F59E0B;
    }
    @media (prefers-color-scheme: dark) {
      svg {
        --ff-icon-bg: #1E1B4B;
        --ff-icon-primary: #C7D2FE;
        --ff-icon-secondary: #A5B4FC;
        --ff-icon-accent: #FBBF24;
      }
    }
  </style>
  <circle cx="50" cy="50" r="46" fill="var(--ff-icon-bg)"/>

  <!-- Old column labels (left, muted) -->
  <rect x="16" y="34" width="24" height="7" rx="3.5" fill="var(--ff-icon-secondary)" opacity="0.55"/>
  <rect x="16" y="47" width="24" height="7" rx="3.5" fill="var(--ff-icon-secondary)" opacity="0.55"/>
  <rect x="16" y="60" width="24" height="7" rx="3.5" fill="var(--ff-icon-secondary)" opacity="0.55"/>

  <!-- Transform arrow -->
  <path d="M44 50.5 L56 50.5" stroke="var(--ff-icon-primary)" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M52.5 46.5 L56.5 50.5 L52.5 54.5" stroke="var(--ff-icon-primary)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- New column labels (right, solid) -->
  <rect x="60" y="34" width="24" height="7" rx="3.5" fill="var(--ff-icon-primary)"/>
  <rect x="60" y="47" width="24" height="7" rx="3.5" fill="var(--ff-icon-primary)"/>
  <rect x="60" y="60" width="24" height="7" rx="3.5" fill="var(--ff-icon-primary)"/>

  <!-- Speed bolt accent -->
  <path d="M50 12 L43 26 L49 26 L44 36 L55 22 L49 22 L54 12 Z" fill="var(--ff-icon-accent)" stroke="var(--ff-icon-accent)" stroke-width="0.6" stroke-linejoin="round"/>
</svg>
