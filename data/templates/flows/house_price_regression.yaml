flowfile_version: 0.9.1
flowfile_id: 9
flowfile_name: House Price Regression
flowfile_settings:
  description: Train and apply a regression model on synthetic house-price data.
  execution_mode: Development
  execution_location: local
  auto_save: false
  show_detailed_progress: true
  max_parallel_workers: 4
  source_registration_id: null
  parameters: []
nodes:
- id: 1
  type: read
  is_start_node: true
  description: 'Load synthetic house-price data'
  node_reference: null
  x_position: 0
  y_position: 200
  left_input_id: null
  right_input_id: null
  input_ids: []
  outputs: [2]
  output_handles: [output-0]
  setting_input:
    cache_results: false
    received_file:
      path: __TEMPLATE_DATA_DIR__/house_prices.csv
      file_type: csv
      table_settings:
        file_type: csv
- id: 2
  type: random_split
  is_start_node: false
  description: '80/20 train/test split (seed=42)'
  node_reference: null
  x_position: 250
  y_position: 200
  left_input_id: null
  right_input_id: null
  input_ids: [1]
  outputs: [3, 4]
  output_handles: [output-0, output-1]
  setting_input:
    cache_results: false
    splits:
    - name: train
      percentage: 80.0
    - name: test
      percentage: 20.0
    seed: 42
- id: 3
  type: train_model
  is_start_node: false
  description: 'Fit a ridge regression on the training rows'
  node_reference: null
  x_position: 500
  y_position: 100
  left_input_id: null
  right_input_id: null
  input_ids: [2]
  outputs: [4]
  output_handles: [output-0]
  setting_input:
    cache_results: false
    train_input:
      target_column: price
      feature_columns: [sqft, bedrooms, bathrooms, age_years, garage_spaces]
      model_type: ridge_regression
      params:
        add_bias: true
        l2_reg: 0.1
      publish_to_catalog: false
      model_name: ''
      catalog_tags: [demo, regression]
- id: 4
  type: wait_for
  is_start_node: false
  description: 'Wait for the trainer to publish the artifact'
  node_reference: null
  x_position: 500
  y_position: 300
  left_input_id: null
  right_input_id: 3
  input_ids: [2]
  outputs: [5]
  output_handles: [output-0]
  setting_input:
    cache_results: false
- id: 5
  type: apply_model
  is_start_node: false
  description: 'Score the held-out test rows using the upstream Train Model'
  node_reference: null
  x_position: 750
  y_position: 300
  left_input_id: null
  right_input_id: null
  input_ids: [4]
  outputs: [6]
  output_handles: [output-0]
  setting_input:
    cache_results: false
    apply_input:
      source: upstream
      upstream_node_id: 3
      output_column: predicted_price
- id: 6
  type: explore_data
  is_start_node: false
  description: 'Inspect predicted vs actual price'
  node_reference: null
  x_position: 1000
  y_position: 300
  left_input_id: null
  right_input_id: null
  input_ids: [5]
  outputs: []
  output_handles: []
  setting_input:
    cache_results: false
    graphic_walker_input: null
_template_meta:
  template_id: house_price_regression
  name: House Price Regression
  description: >-
    End-to-end regression demo: load house data, split train/test, fit a ridge
    model with the Train Model node, sync via a Wait For barrier, score the
    test set with Apply Model, and explore the predictions. Showcases the new
    ML nodes and the artifact catalog round-trip.
  category: Beginner
  tags: [ml, regression, train_model, apply_model, wait_for]
  node_count: 6
  icon: show_chart
_required_csv_files: [house_prices.csv]
