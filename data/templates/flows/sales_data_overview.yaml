    cache_results: false
    filter_input:
      mode: basic
      basic_filter:
        field: region
        operator: equals
        value: North
- id: 3
  type: group_by
  is_start_node: false
  description: ''
  node_reference: null
  x_position: 500
  y_position: 200
  left_input_id: null
  right_input_id: null
  input_ids: [2]
  outputs: [4]
  setting_input:
    cache_results: false
    groupby_input:
      agg_cols:
      - old_name: product
        agg: groupby
        new_name: product
      - old_name: amount
        agg: sum
        new_name: total_revenue
      - old_name: amount
        agg: count
        new_name: order_count
      - old_name: amount
        agg: mean
        new_name: avg_order_value
